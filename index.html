<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube → Audio Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    input[type="url"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      color: #e8e8e8;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="url"]:focus { border-color: #555; }
    input[type="url"]::placeholder { color: #555; }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #e52d27;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #c0211c; }
    button:disabled { background: #3a1010; color: #666; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      min-height: 1.2rem;
      color: #888;
    }
    #status.error { color: #e55; }
    #status.ok { color: #5c5; }

    #dl-wrap {
      margin-top: 1rem;
      display: none;
    }
    #dl-wrap a {
      display: block;
      text-align: center;
      padding: 0.65rem;
      background: #1e3a1e;
      border: 1px solid #2d6b2d;
      border-radius: 8px;
      color: #6dca6d;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    #dl-wrap a:hover { background: #254a25; }

    .note {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #444;
      line-height: 1.5;
    }
    .note a { color: #555; }
  </style>
</head>
<body>
<div class="card">
  <h1>YouTube → Audio</h1>

  <div class="row">
    <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
  </div>

  <button id="btn">変換してダウンロード (Opus/WebM)</button>

  <div id="status"></div>
  <div id="dl-wrap"><a id="dl-link">↓ ダウンロード</a></div>

  <p class="note">
    <a href="https://github.com/TeamPiped/Piped" target="_blank" rel="noopener">Piped</a> のパブリック API を利用してストリームURLを取得します。<br>
    フォーマットは Opus/WebM（MP3 より軽量・高音質）です。
  </p>
</div>

<script>
// Piped public API instances (tried in order)
const PIPED_APIS = [
  'https://pipedapi.kavin.rocks',
  'https://piped-api.garudalinux.org',
  'https://api.piped.projectsegfau.lt',
  'https://pipedapi.tokhmi.xyz',
];

const btn = document.getElementById('btn');
const urlInput = document.getElementById('url');
const status = document.getElementById('status');
const dlWrap = document.getElementById('dl-wrap');
const dlLink = document.getElementById('dl-link');

function setStatus(msg, type = '') {
  status.textContent = msg;
  status.className = type;
}

function extractVideoId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    if (u.hostname.includes('youtube.com')) {
      if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2];
      return u.searchParams.get('v');
    }
  } catch {}
  return null;
}

async function fetchStreams(apiBase, videoId) {
  const res = await fetch(`${apiBase}/streams/${videoId}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function bestAudioStream(audioStreams) {
  // prefer opus, then pick highest bitrate
  const opus = audioStreams.filter(s => s.mimeType && s.mimeType.includes('opus'));
  const pool = opus.length ? opus : audioStreams;
  return pool.reduce((best, s) => (!best || s.bitrate > best.bitrate) ? s : best, null);
}

async function downloadBlob(streamUrl, filename) {
  setStatus('ダウンロード中...');
  const res = await fetch(streamUrl);
  if (!res.ok) throw new Error(`ストリーム取得失敗 (HTTP ${res.status})`);
  const blob = await res.blob();
  const objUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = objUrl;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(objUrl), 10000);
}

btn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url) { setStatus('URLを入力してください', 'error'); return; }

  const videoId = extractVideoId(url);
  if (!videoId) { setStatus('有効な YouTube URL を入力してください', 'error'); return; }

  dlWrap.style.display = 'none';
  btn.disabled = true;

  let data = null;
  for (let i = 0; i < PIPED_APIS.length; i++) {
    setStatus(`ストリーム情報を取得中… (${i + 1}/${PIPED_APIS.length})`);
    try {
      data = await fetchStreams(PIPED_APIS[i], videoId);
      break;
    } catch (e) {
      if (i === PIPED_APIS.length - 1) {
        setStatus('全インスタンスへの接続に失敗しました: ' + e.message, 'error');
        btn.disabled = false;
        return;
      }
    }
  }

  const stream = bestAudioStream(data.audioStreams || []);
  if (!stream) {
    setStatus('音声ストリームが見つかりませんでした', 'error');
    btn.disabled = false;
    return;
  }

  const title = (data.title || videoId).replace(/[\\/:*?"<>|]/g, '_');
  const ext = stream.mimeType?.includes('opus') ? 'webm' : 'webm';
  const filename = `${title}.${ext}`;

  try {
    await downloadBlob(stream.url, filename);
    setStatus('ダウンロード完了！', 'ok');
  } catch {
    // CORS blocked on direct fetch — fall back to link
    dlLink.href = stream.url;
    dlLink.download = filename;
    dlLink.textContent = `↓ ダウンロード (${Math.round(stream.bitrate / 1000)} kbps)`;
    dlWrap.style.display = 'block';
    setStatus('リンクを右クリック→「名前を付けて保存」でダウンロードできます', 'ok');
  }

  btn.disabled = false;
});

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
</script>
</body>
</html>
